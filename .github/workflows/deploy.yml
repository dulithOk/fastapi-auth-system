name: Release & Deploy

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v1.0.0, v1.0.1 etc

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-auth:${{ steps.vars.outputs.VERSION }} \
                       -t ${{ secrets.DOCKER_USERNAME }}/fastapi-auth:latest .

      - name: Push version tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-auth:${{ steps.vars.outputs.VERSION }}

      - name: Push latest tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-auth:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd fastapi-auth
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
